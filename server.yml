empresa:
  nome: "Minha Empresa Delivery"
  descricao: "Delivery de comidas e bebidas"
  telefone: "5511999999999"
  endereco: "Rua Exemplo, 123 - Centro"
  horario_funcionamento: "24 horas"
  logo: "/logo.png"
  cor_primaria: "#FF6B35"
  cor_secundaria: "#004E89"

whatsapp:
  session_path: "./whatsapp-session"
  mensagem_bem_vindo: |
    Olá! *Bem-vindo ao {nome}* 🚀
    
    Funcionamos *24 horas por dia*!
    
    Escolha uma opção:
    1️⃣ - Ver Cardápio
    2️⃣ - Fazer Pedido
    3️⃣ - Falar com Atendente
    4️⃣ - Formas de Pagamento
    5️⃣ - Avaliar Serviço

elevenlabs:
  api_key: ""
  voice_id: "21m00Tcm4TlvDq8ikWAM"
  model: "eleven_multilingual_v2"
  stability: 0.5
  similarity_boost: 0.75

groq:
  api_key: ""
  model: "llama-3.3-70b-versatile"
  temperatura: 0.7
  max_tokens: 300
  prompt_sistema: |
    Você é um atendente virtual da empresa {nome}.
    
    REGRAS IMPORTANTES:
    - Funcionamos 24 horas por dia, todos os dias
    - Seja educado, profissional e simpático
    - Ajude clientes com pedidos e dúvidas do cardápio
    - Informe sobre formas de pagamento
    - Quando finalizar um pedido, peça avaliação
    - Não invente informações que não estão no cardápio
    - Se não souber responder, direcione para atendente humano
    
    Sempre responda de forma concisa e direta.

